<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>辯論法庭 — 普羅米修斯之火</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-light:#f0d080;--gold-dark:#7a5c1e;
  --parchment:#f5ead0;--parchment-dark:#e8d5a8;
  --ink:#1a1208;--ink-light:#3d2e0e;
  --pro:#1a3a6b;--pro-light:#2a5aaa;
  --con:#6b1a1a;--con-light:#aa2a2a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Noto Serif TC',serif;background:#0d0a05;color:var(--ink);min-height:100vh;
  background-image:radial-gradient(ellipse at 50% 0%,#2a1f05 0%,#0d0a05 60%)}

.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ══ SETUP ══ */
#setup{align-items:center;justify-content:center;padding:32px 20px;gap:20px}
.court-emblem{font-size:72px;filter:drop-shadow(0 0 24px var(--gold));animation:floatGlow 3s ease-in-out infinite}
@keyframes floatGlow{0%,100%{transform:translateY(0);filter:drop-shadow(0 0 18px var(--gold))}50%{transform:translateY(-8px);filter:drop-shadow(0 0 36px var(--gold-light))}}
.court-title{font-size:clamp(24px,5vw,40px);font-weight:900;color:var(--gold-light);letter-spacing:.12em;text-shadow:0 2px 12px var(--gold-dark);margin:6px 0 3px;text-align:center}
.court-subtitle{color:#b09050;font-size:clamp(12px,2vw,16px);letter-spacing:.1em;text-align:center}
.divider{width:260px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

.topic-display{width:min(560px,100%);text-align:center}
.topic-fixed{background:linear-gradient(135deg,#1e160a,#2a1e0e);border:2px solid var(--gold);border-radius:14px;padding:16px 20px;color:var(--gold-light);font-size:clamp(15px,2.8vw,19px);font-weight:700;line-height:1.5;letter-spacing:.03em}
.topic-stances{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;font-size:clamp(12px,2vw,14px)}
.ts.pro{color:#6ab0ff;font-weight:700}.ts.con{color:#ff8080;font-weight:700}.ts-sep{color:#5a4020}

.sides-config{width:min(560px,100%);display:grid;grid-template-columns:1fr 1fr;gap:14px}
.side-card{border-radius:14px;padding:16px;text-align:center}
.side-card.pro{background:linear-gradient(160deg,#0d1f3d,#162a50);border:2px solid var(--pro-light)}
.side-card.con{background:linear-gradient(160deg,#3d0d0d,#501616);border:2px solid var(--con-light)}
.side-icon{font-size:36px;margin-bottom:6px}
.side-label{font-size:clamp(14px,3vw,19px);font-weight:700}
.side-card.pro .side-label{color:#6ab0ff}
.side-card.con .side-label{color:#ff8080}
.side-desc{font-size:clamp(10px,1.8vw,12px);color:#9a8860;margin-top:5px;line-height:1.5}
.side-name-input{width:100%;margin-top:8px;padding:7px 10px;border-radius:8px;
  border:2px solid rgba(255,255,255,.15);background:rgba(0,0,0,.3);
  color:white;font-family:'Noto Serif TC',serif;font-size:14px;text-align:center}
.side-name-input::placeholder{color:#555}

.rounds-picker{width:min(560px,100%);text-align:center}
.rounds-picker h3{color:var(--gold);font-size:17px;margin-bottom:6px;letter-spacing:.08em}
.rounds-note{color:#7a6030;font-size:12px;margin-bottom:12px}
.rounds-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.rounds-opt{padding:10px 20px;border-radius:999px;border:2px solid var(--gold-dark);background:linear-gradient(135deg,#1e160a,#2a1e0e);color:var(--parchment);font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.rounds-opt:hover,.rounds-opt.selected{border-color:var(--gold);background:linear-gradient(135deg,#2a1e08,#3d2e10);color:var(--gold-light)}

padding:16px 44px;font-size:clamp(17px,3.5vw,23px);font-weight:900;
  background:linear-gradient(135deg,#b8860b,var(--gold),#b8860b);
  border:0;border-radius:999px;color:var(--ink);font-family:'Noto Serif TC',serif;
  cursor:pointer;letter-spacing:.1em;
  box-shadow:0 6px 0 #5a3e00,0 12px 30px rgba(201,168,76,.4);transition:.15s}
.start-btn:active{transform:translateY(5px);box-shadow:0 1px 0 #5a3e00}

/* ══ DEBATE ══ */
#debate{padding:0;background:#0d0a05}
.debate-top{background:linear-gradient(180deg,#1a1005 0%,#0d0a05 100%);padding:10px 14px 0;border-bottom:1px solid #2a1e08}
.topic-bar{text-align:center;padding:7px 14px;background:rgba(201,168,76,.08);border:1px solid var(--gold-dark);border-radius:8px;color:var(--gold-light);font-size:clamp(12px,2vw,15px);font-weight:700;letter-spacing:.04em;margin-bottom:8px}

/* Scale */
.scale-wrap{display:flex;align-items:flex-end;justify-content:center;gap:0;padding:6px 0 10px}
.scale-side{display:flex;flex-direction:column;align-items:center;width:clamp(90px,20vw,150px)}
.scale-side-label{font-size:clamp(10px,1.6vw,13px);font-weight:700;letter-spacing:.06em;margin-bottom:3px}
.scale-side.pro .scale-side-label{color:#6ab0ff}
.scale-side.con .scale-side-label{color:#ff8080}
.scale-score{font-size:clamp(26px,5vw,42px);font-weight:900;line-height:1}
.scale-side.pro .scale-score{color:#4a9eff}
.scale-side.con .scale-score{color:#ff5555}
.scale-name{font-size:clamp(9px,1.5vw,12px);color:#7a6030;margin-top:1px}
.scale-center{display:flex;flex-direction:column;align-items:center;width:clamp(70px,14vw,110px)}
.scale-pole{width:5px;height:clamp(40px,7vw,60px);background:linear-gradient(#c9a84c,#7a5c1e);border-radius:3px;margin:0 auto}
.scale-beam-wrap{position:relative;width:clamp(160px,36vw,260px);height:clamp(40px,7vw,60px)}
.scale-beam{position:absolute;bottom:0;left:50%;width:clamp(160px,36vw,260px);height:7px;
  background:linear-gradient(90deg,#7a5c1e,#c9a84c,#7a5c1e);border-radius:4px;
  transform-origin:center bottom;transform:translateX(-50%) rotate(0deg);
  transition:transform 1.2s cubic-bezier(.34,1.56,.64,1);box-shadow:0 3px 10px rgba(0,0,0,.5)}
.scale-pan{position:absolute;bottom:9px;width:clamp(38px,8vw,58px);height:clamp(12px,2.2vw,18px);
  background:linear-gradient(#c9a84c,#7a5c1e);border-radius:50%;box-shadow:0 3px 8px rgba(0,0,0,.4);
  transition:bottom 1.2s cubic-bezier(.34,1.56,.64,1)}
.scale-pan.left{left:0}.scale-pan.right{right:0}

/* Rounds */
.rounds-bar{display:flex;gap:5px;justify-content:center;padding:6px 0 8px;flex-wrap:wrap}
.round-pip{width:clamp(26px,4.5vw,34px);height:clamp(26px,4.5vw,34px);border-radius:50%;
  border:2px solid #3a2a10;background:#1a1005;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#5a4020;font-weight:700;transition:.3s}
.round-pip.pro{background:var(--pro);border-color:var(--pro-light);color:#aad0ff}
.round-pip.con{background:var(--con);border-color:var(--con-light);color:#ffaaaa}
.round-pip.active{box-shadow:0 0 10px var(--gold);border-color:var(--gold);color:var(--gold-light);background:#2a1e08;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 6px var(--gold)}50%{box-shadow:0 0 18px var(--gold-light)}}

/* Round panel */
.round-panel{margin:8px 12px 0;border-radius:18px;overflow:hidden;border:2px solid #2a1e08;background:linear-gradient(160deg,#13100a,#1a1408);box-shadow:0 6px 28px rgba(0,0,0,.5)}
.round-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid #2a1e08}
.speaker-badge{padding:5px 14px;border-radius:999px;font-size:clamp(12px,2vw,15px);font-weight:900;letter-spacing:.06em;flex-shrink:0}
.speaker-badge.pro{background:var(--pro);color:#aad0ff;border:2px solid var(--pro-light)}
.speaker-badge.con{background:var(--con);color:#ffaaaa;border:2px solid var(--con-light)}
.round-title{color:var(--gold);font-size:clamp(12px,2vw,15px);font-weight:700}

.transcript-area{min-height:clamp(60px,12vw,100px);max-height:clamp(80px,16vw,130px);overflow-y:auto;padding:12px 16px;font-size:clamp(13px,2vw,16px);color:var(--parchment);line-height:1.7}
.transcript-area .placeholder{color:#4a3a18;font-style:italic}

.record-section{padding:12px 16px;border-top:1px solid #2a1e08;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rec-btn{display:flex;align-items:center;gap:7px;padding:11px 18px;border-radius:999px;border:0;
  font-family:'Noto Serif TC',serif;font-size:clamp(13px,2.2vw,16px);font-weight:700;
  cursor:pointer;transition:.15s;flex-shrink:0;min-height:46px}
.rec-btn.start{background:linear-gradient(135deg,#8b0000,#cc2200);color:#ffcccc;box-shadow:0 4px 0 #4a0000,0 8px 18px rgba(200,0,0,.3)}
.rec-btn.stop{background:linear-gradient(135deg,#333,#555);color:#ccc;box-shadow:0 4px 0 #111}
.rec-btn:active{transform:translateY(3px);box-shadow:none}
.rec-dot{width:9px;height:9px;border-radius:50%;background:#ff4444;animation:blink .8s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.rec-status{color:#7a6030;font-size:clamp(11px,1.8vw,13px);flex:1}
.rec-status.live{color:#ff8080;font-weight:700}

/* Scale tilt label */
.scale-tilt-label{font-size:clamp(11px,1.8vw,14px);font-weight:900;letter-spacing:.06em;color:#7a6030;text-align:center;margin-bottom:4px;min-height:18px;transition:color .5s}
.scale-tilt-label.leading-pro{color:#4a9eff}
.scale-tilt-label.leading-con{color:#ff5555}
.scale-leading{min-height:20px;font-size:11px;font-weight:900;letter-spacing:.06em;margin-top:3px;transition:opacity .4s}
.scale-side.pro .scale-leading{color:#4a9eff}
.scale-side.con .scale-leading{color:#ff5555}

/* Score display card */
.score-display-card{background:rgba(0,0,0,.35);border:2px solid var(--gold-dark);border-radius:16px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.score-display-inner{display:flex;align-items:baseline;gap:6px;flex-shrink:0}
.score-display-label{font-size:13px;color:var(--gold);font-weight:700;margin-right:4px}
.score-display-num{font-size:clamp(42px,8vw,64px);font-weight:900;line-height:1;transition:color .4s}
.score-display-num.high{color:#55efc4}
.score-display-num.mid{color:#fdcb6e}
.score-display-num.low{color:#ff7675}
.score-display-max{font-size:16px;color:#7a6030;font-weight:700}
.score-bars{flex:1;min-width:160px;display:flex;flex-direction:column;gap:6px}
.score-bar-row{display:flex;align-items:center;gap:8px}
.score-bar-name{font-size:11px;color:#b09050;width:72px;flex-shrink:0;text-align:right}
.score-bar-track{flex:1;height:10px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.34,1.2,.64,1)}
.score-bar-val{font-size:11px;font-weight:900;color:#ffeaa7;width:16px;flex-shrink:0}


.ai-feedback{margin:8px 12px;border-radius:14px;padding:12px 16px;border-left:4px solid var(--gold);background:rgba(201,168,76,.06);display:none}
.ai-feedback.show{display:block}
.ai-feedback-header{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.judge-icon{font-size:20px}
.judge-label{color:var(--gold);font-size:12px;font-weight:700;letter-spacing:.06em}
.ai-score-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.ai-score-badge{padding:3px 12px;border-radius:999px;font-size:12px;font-weight:900}
.ai-score-badge.pro{background:var(--pro);color:#aad0ff}
.ai-score-badge.con{background:var(--con);color:#ffaaaa}
.ai-reason{color:var(--parchment-dark);font-size:clamp(12px,1.8vw,14px);line-height:1.65}
.ai-loading{color:#7a6030;font-style:italic;font-size:13px;animation:fade .8s infinite alternate}
@keyframes fade{from{opacity:.4}to{opacity:1}}

/* Actions */
.debate-actions{padding:10px 14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;border-top:1px solid #1a1208;margin-top:8px}
.action-btn{padding:11px 20px;border-radius:999px;border:0;font-family:'Noto Serif TC',serif;font-size:clamp(13px,2.2vw,16px);font-weight:700;cursor:pointer;transition:.15s;min-height:46px}
.action-btn.next{background:linear-gradient(135deg,#b8860b,var(--gold));color:var(--ink);box-shadow:0 4px 0 #5a3e00}
.action-btn.verdict{background:linear-gradient(135deg,#4a0070,#8b00cc);color:#e0aaff;box-shadow:0 4px 0 #1a0030;border:2px solid #9b30dd}
.action-btn.back{background:linear-gradient(135deg,#1a1208,#2a1e08);color:#7a6030;border:2px solid #3a2a10}
.action-btn:active{transform:translateY(3px);box-shadow:none}
.action-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ══ VERDICT ══ */
#verdict{align-items:center;justify-content:center;padding:28px 20px;gap:0;
  background:radial-gradient(ellipse at 50% 30%,#1a0d00 0%,#0d0a05 70%)}
.gavel-wrap{text-align:center;margin-bottom:14px}
.gavel-icon{font-size:72px;animation:gavel 2s ease-in-out 3;filter:drop-shadow(0 0 22px var(--gold))}
@keyframes gavel{0%,100%{transform:rotate(0)}30%{transform:rotate(-35deg)}60%{transform:rotate(10deg)}}
.verdict-box{width:min(620px,95vw);background:linear-gradient(160deg,#1a1005,#221808);border:3px solid var(--gold);border-radius:22px;padding:clamp(18px,4vw,32px);box-shadow:0 0 60px rgba(201,168,76,.2),inset 0 0 40px rgba(0,0,0,.5);text-align:center}
.verdict-court-label{color:#7a6030;font-size:12px;letter-spacing:.15em;margin-bottom:10px}
.verdict-title{font-size:clamp(32px,7vw,56px);font-weight:900;margin-bottom:5px;letter-spacing:.06em}
.verdict-title.guilty{color:#ff4444;text-shadow:0 0 30px rgba(255,68,68,.5)}
.verdict-title.innocent{color:#44ff88;text-shadow:0 0 30px rgba(68,255,136,.5)}
.verdict-subtitle{font-size:clamp(14px,2.5vw,19px);color:var(--gold-light);margin-bottom:16px;font-weight:700}
.verdict-winner{display:inline-block;padding:7px 22px;border-radius:999px;font-size:clamp(14px,2.5vw,18px);font-weight:900;margin-bottom:16px}
.verdict-winner.pro{background:var(--pro);color:#aad0ff;border:2px solid var(--pro-light)}
.verdict-winner.con{background:var(--con);color:#ffaaaa;border:2px solid var(--con-light)}
.verdict-reasoning{background:rgba(0,0,0,.3);border:1px solid #2a1e08;border-radius:12px;padding:14px 18px;text-align:left;color:var(--parchment);font-size:clamp(12px,2vw,15px);line-height:1.8;margin-bottom:16px;max-height:260px;overflow-y:auto}
.scores-final{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.score-final-card{border-radius:12px;padding:12px;text-align:center}
.score-final-card.pro{background:linear-gradient(160deg,#0d1f3d,#162a50);border:2px solid var(--pro-light)}
.score-final-card.con{background:linear-gradient(160deg,#3d0d0d,#501616);border:2px solid var(--con-light)}
.score-final-name{font-size:clamp(12px,2vw,15px);font-weight:700;margin-bottom:3px}
.score-final-card.pro .score-final-name{color:#6ab0ff}
.score-final-card.con .score-final-name{color:#ff8080}
.score-final-num{font-size:clamp(30px,6vw,46px);font-weight:900}
.score-final-card.pro .score-final-num{color:#4a9eff}
.score-final-card.con .score-final-num{color:#ff5555}
.score-final-label{font-size:11px;color:#7a6030;margin-top:1px}
.restart-btn{padding:13px 34px;border-radius:999px;border:0;background:linear-gradient(135deg,#b8860b,var(--gold));color:var(--ink);font-family:'Noto Serif TC',serif;font-size:clamp(15px,3vw,19px);font-weight:900;cursor:pointer;box-shadow:0 4px 0 #5a3e00}
.restart-btn:active{transform:translateY(3px);box-shadow:none}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.loading-overlay.show{display:flex}
.loading-spinner{font-size:48px;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--gold);font-size:17px;margin-top:14px;letter-spacing:.1em}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#3a2a10;border-radius:2px}
</style>
</head>
<body>

<!-- SETUP -->
<section id="setup" class="screen active">
  <div class="court-emblem">⚖️</div>
  <div class="court-title">神界法庭</div>
  <div class="court-subtitle">OLYMPUS DEBATE COURT</div>
  <div class="divider"></div>

  <div class="topic-display">
    <div class="topic-fixed">普羅米修斯偷火給人類，這樣做是對的嗎？</div>
    <div class="topic-stances"><span class="ts pro">正方：對</span><span class="ts-sep">／</span><span class="ts con">反方：不對</span></div>
  </div>

  <div class="sides-config">
    <div class="side-card pro">
      <div class="side-icon">🛡️</div>
      <div class="side-label">正方</div>
      <div class="side-desc">支持：偷火是正確的</div>
      <input class="side-name-input" id="proName" placeholder="正方隊名（選填）" maxlength="10"/>
    </div>
    <div class="side-card con">
      <div class="side-icon">⚔️</div>
      <div class="side-label">反方</div>
      <div class="side-desc">反對：違反了宙斯的規定</div>
      <input class="side-name-input" id="conName" placeholder="反方隊名（選填）" maxlength="10"/>
    </div>
  </div>

  <button class="start-btn" onclick="startDebate()">🔔 開庭！</button>
</section>

<!-- DEBATE -->
<section id="debate" class="screen">
  <div class="debate-top">
    <div class="topic-bar" id="topicBar"></div>
    <div class="scale-wrap">
      <div class="scale-side pro">
        <div class="scale-side-label">正方</div>
        <div class="scale-score" id="proScore">0</div>
        <div class="scale-name" id="proNameDisp">—</div>
        <div class="scale-leading" id="proLeading"></div>
      </div>
      <div class="scale-center">
        <div class="scale-tilt-label" id="scaleTiltLabel">持平</div>
        <div class="scale-beam-wrap">
          <div class="scale-beam" id="scaleBeam"></div>
          <div class="scale-pan left" id="panL"></div>
          <div class="scale-pan right" id="panR"></div>
        </div>
        <div class="scale-pole"></div>
      </div>
      <div class="scale-side con">
        <div class="scale-side-label">反方</div>
        <div class="scale-score" id="conScore">0</div>
        <div class="scale-name" id="conNameDisp">—</div>
        <div class="scale-leading" id="conLeading"></div>
      </div>
    </div>
    <div class="rounds-bar" id="roundsBar"></div>
  </div>

  <div class="round-panel">
    <div class="round-header">
      <span class="speaker-badge pro" id="speakerBadge">正方</span>
      <span class="round-title" id="roundTitle">第 1 回合</span>
    </div>
    <div class="transcript-area" id="transcriptArea">
      <span class="placeholder">按下「開始錄音」，學生發言後按「停止」</span>
    </div>
    <div class="record-section">
      <button class="rec-btn start" id="recBtn" onclick="toggleRecord()">
        <span>🎙️</span> 開始錄音
      </button>
      <span class="rec-status" id="recStatus">等待發言…</span>
    </div>
  </div>

  <div class="ai-feedback" id="aiFeedback">
    <div class="ai-feedback-header">
      <span class="judge-icon">👨‍⚖️</span>
      <span class="judge-label">法官評語</span>
    </div>
    <div class="score-display-card" id="scoreDisplayCard" style="display:none">
      <div class="score-display-inner">
        <div class="score-display-label" id="scoreDisplayLabel">本回合得分</div>
        <div class="score-display-num" id="scoreDisplayNum">0</div>
        <div class="score-display-max">/ 12 分</div>
      </div>
      <div class="score-bars" id="scoreBars"></div>
    </div>
    <div class="ai-score-row" id="aiScoreRow"></div>
    <div class="ai-reason" id="aiReason"></div>
  </div>

  <div class="debate-actions">
    <button class="action-btn back" onclick="goSetup()">← 重新設定</button>
    <button class="action-btn next" id="nextBtn" onclick="nextRound()" disabled>下一回合 →</button>
    <button class="action-btn verdict" id="verdictBtn" onclick="requestVerdict()" disabled>⚖️ 結束宣判</button>
  </div>
</section>

<!-- VERDICT -->
<section id="verdict" class="screen">
  <div class="gavel-wrap"><span class="gavel-icon">🔨</span></div>
  <div class="verdict-box">
    <div class="verdict-court-label">神界法庭 最終裁決</div>
    <div class="verdict-title" id="verdictTitle"></div>
    <div class="verdict-subtitle" id="verdictSubtitle"></div>
    <div class="verdict-winner" id="verdictWinner"></div>
    <div class="scores-final">
      <div class="score-final-card pro">
        <div class="score-final-name" id="vProName">正方</div>
        <div class="score-final-num" id="vProScore">0</div>
        <div class="score-final-label">總分</div>
      </div>
      <div class="score-final-card con">
        <div class="score-final-name" id="vConName">反方</div>
        <div class="score-final-num" id="vConScore">0</div>
        <div class="score-final-label">總分</div>
      </div>
    </div>
    <div class="verdict-reasoning" id="verdictReasoning"></div>
    <button class="restart-btn" onclick="goSetup()">🔁 再開一場</button>
  </div>
</section>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner">⚖️</div>
  <div class="loading-text" id="loadingText">法官思考中…</div>
</div>

<script>
let TOTAL_ROUNDS = 6;

const COURSE_TEXT = `《幸福的火苗》課文重點（侯詩瑜 改寫自希臘神話）：
1. 普羅米修斯奉宙斯命令造出人類，雅典娜為他們注入靈魂。普羅米修斯費心教人類各種技能，視他們如心愛的孩子。
2. 宙斯立下規定：不給人類神界的火。人類只能躲避野獸、忍受嚴寒，彼此緊靠取暖，全身發抖。
3. 普羅米修斯不忍心，請雅典娜帶路，趁宙斯不在奧林匹斯山，偷偷引了阿波羅太陽馬車落下的火屑帶到人間。
4. 人類得到火後：能驅趕野獸（野獸怕火）、取暖（好溫暖）、烤熟食物（脆脆香香的，更好吃了），生活大為改善。
5. 宙斯回來後大發雷霆，命人把普羅米修斯綁在陡峭岩壁，每天讓老鷹啄食他的身體，痛苦難耐。
6. 普羅米修斯在痛苦中依稀記得人類圍著火焰唱跳、高喊感謝的畫面。`;

const TOPIC = {q:'普羅米修斯偷火給人類，這樣做是對的嗎？',pro:'支持：偷火是正確的，因為幫助了人類',con:'反對：偷火是錯誤的，因為違反了宙斯的規定'};

let proName='正方', conName='反方';
let currentRound=0, scores={pro:0,con:0}, roundData=[];
let isRecording=false, recognition=null, liveTranscript='';

function startDebate(){
  proName=document.getElementById('proName').value.trim()||'正方';
  conName=document.getElementById('conName').value.trim()||'反方';
  currentRound=0; scores={pro:0,con:0}; roundData=[];
  buildRoundsBar(); updateScaleUI(); showScreen('debate'); loadRound();
}

function getSide(i){return i%2===0?'pro':'con'}

function buildRoundsBar(){
  // rounds bar grows dynamically; start with just round 1
  const bar=document.getElementById('roundsBar');
  bar.innerHTML='';
  addRoundPip(0, true);
}

function addRoundPip(i, active){
  const bar=document.getElementById('roundsBar');
  const p=document.createElement('div');
  p.className='round-pip'+(active?' active':'');
  p.id='pip'+i; p.textContent=i+1; bar.appendChild(p);
}

function loadRound(){
  const side=getSide(currentRound);
  const name=side==='pro'?proName:conName;
  const badge=document.getElementById('speakerBadge');
  badge.textContent=name; badge.className='speaker-badge '+side;
  document.getElementById('roundTitle').textContent='第 '+(currentRound+1)+' 回合';
  document.getElementById('transcriptArea').innerHTML='<span class="placeholder">按下「開始錄音」，學生發言後按「停止」</span>';
  document.getElementById('recBtn').className='rec-btn start';
  document.getElementById('recBtn').innerHTML='<span>🎙️</span> 開始錄音';
  document.getElementById('recStatus').textContent='等待發言…';
  document.getElementById('recStatus').className='rec-status';
  document.getElementById('aiFeedback').classList.remove('show');
  document.getElementById('scoreDisplayCard').style.display='none';
  document.getElementById('nextBtn').disabled=true;
  document.getElementById('verdictBtn').disabled=true;
  liveTranscript='';
  document.getElementById('topicBar').textContent=TOPIC.q;
  document.getElementById('proNameDisp').textContent=proName;
  document.getElementById('conNameDisp').textContent=conName;
  // mark previous pips
  for(let i=0;i<currentRound;i++){
    const p=document.getElementById('pip'+i);
    if(p)p.className='round-pip '+getSide(i);
  }
  const cur=document.getElementById('pip'+currentRound);
  if(cur)cur.className='round-pip active';
}

function toggleRecord(){isRecording?stopRecord():startRecord()}

function startRecord(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('此裝置不支援語音辨識，請改用 Chrome 或 Safari。');return}
  recognition=new SR();
  recognition.lang='zh-TW'; recognition.continuous=true; recognition.interimResults=true;
  liveTranscript='';
  let interimText='';

  recognition.onresult=(e)=>{
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        liveTranscript+=e.results[i][0].transcript;
        interimText='';
      } else {
        interimText=e.results[i][0].transcript;
      }
    }
    document.getElementById('transcriptArea').textContent=liveTranscript+interimText;
  };

  recognition.onend=()=>{
    // 把還沒確定的 interim 也納入（以防最後一句沒有變 final）
    if(interimText) liveTranscript+=interimText;
    isRecording=false;
    processAfterStop();
  };

  recognition.onerror=(e)=>{
    isRecording=false;
    if(e.error==='no-speech'){
      document.getElementById('recStatus').textContent='沒有偵測到聲音，請靠近麥克風再試一次。';
    } else {
      document.getElementById('recStatus').textContent='辨識錯誤：'+e.error;
    }
  };

  recognition.start();
  isRecording=true;
  document.getElementById('recBtn').className='rec-btn stop';
  document.getElementById('recBtn').innerHTML='<span class="rec-dot"></span> 停止錄音';
  document.getElementById('recStatus').textContent='錄音中…';
  document.getElementById('recStatus').className='rec-status live';
}

function stopRecord(){
  if(recognition) recognition.stop();
  // 後續由 recognition.onend 接手
  document.getElementById('recBtn').className='rec-btn start';
  document.getElementById('recBtn').innerHTML='<span>🎙️</span> 開始錄音';
  document.getElementById('recStatus').textContent='處理中…';
}

async function processAfterStop(){
  const raw=liveTranscript.trim();
  if(!raw){
    document.getElementById('recStatus').textContent='沒有偵測到發言，請再試一次。';
    return;
  }

  // 先顯示原始辨識結果
  document.getElementById('transcriptArea').textContent=raw;
  document.getElementById('recStatus').textContent='整理發言中…';

  // 用 AI 把口語整理成通順句子
  let cleaned=raw;
  try{
    const cleanRes=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        messages:[{role:'user',content:
          `以下是國小五年級學生的辯論發言，由語音辨識轉錄，可能有口語贅字、重複或辨識錯誤。
請幫我整理成通順的書面文字，保留學生原本的意思和論點，不要增加或改變任何論點內容，不要加標點以外的任何說明。
只輸出整理後的發言，不要有任何前言或解釋。

原始發言：「${raw}」`
        }]
      })
    });
    const cleanData=await cleanRes.json();
    cleaned=cleanData.content.map(c=>c.text||'').join('').trim()||raw;
    document.getElementById('transcriptArea').textContent=cleaned;
  }catch(e){
    // 整理失敗就用原始的
    cleaned=raw;
  }

  document.getElementById('recStatus').textContent='錄音結束，AI 評分中…';
  evaluateArgument(cleaned);
}

async function evaluateArgument(text){
  const side=getSide(currentRound);
  const sideName=side==='pro'?proName:conName;
  const stanceDesc=side==='pro'?TOPIC.pro:TOPIC.con;
  const fb=document.getElementById('aiFeedback');
  fb.classList.add('show');
  document.getElementById('aiScoreRow').innerHTML='';
  document.getElementById('aiReason').innerHTML='<span class="ai-loading">⚖️ 法官思考中…</span>';

  const prompt=`你是一位嚴格但公正的國語課辯論法官，學生正在辯論希臘神話課文《幸福的火苗》。

【課文重點】
${COURSE_TEXT}

【辯論題目】
${TOPIC.q}

【發言方】
${sideName}（${stanceDesc}）

【本回合發言內容】
「${text}」

請從以下四個面向評分，每項0-3分，合計0-12分：
1. 立場清楚（有沒有清楚說出自己的主張）
2. 課文依據（有沒有引用或提到《幸福的火苗》課文的內容）
3. 理由說服力（理由是否合理、有力，能讓人信服）
4. 表達清楚（說話是否順暢、讓人聽得懂）

評語規則（非常重要）：
- 學生是國小五年級，請用溫暖鼓勵的語氣，不要太嚴厲
- breakdown、strength、weakness 請用「你」來稱呼學生，口語親切
- weakness 必須搭配一個具體的課文引導提示，例如：「課文裡有提到『野獸因為怕火而遠離』，你可以用這個來支持你的論點喔！」或「課文說普羅米修斯把人類視為心愛的孩子，這個細節很有說服力，下次可以試試看！」
- scale_reason 用活潑的一句話說明天秤為何傾斜（或沒有）

請用 JSON 格式回應，不要有任何其他文字或 markdown：
{"score":數字,"cats":{"立場清楚":數字,"課文依據":數字,"理由說服力":數字,"表達清楚":數字},"breakdown":"評分說明（用你稱呼學生，親切口語）","strength":"說得最好的地方（具體指出）","weakness":"可以加強的地方，並附上一個課文中可以用的具體提示","scale_reason":"天秤說明，一句活潑的話"}`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const raw=data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const p=JSON.parse(raw);
    const gained=p.score||0;
    scores[side]+=gained;
    roundData.push({side,transcript:text,score:gained,data:p});
    document.getElementById('proScore').textContent=scores.pro;
    document.getElementById('conScore').textContent=scores.con;
    updateScaleUI();
    document.getElementById('aiScoreRow').innerHTML=`<span class="ai-score-badge ${side}">${sideName} 得 ${gained} 分 🏅</span>`;

    // Big score card
    const card=document.getElementById('scoreDisplayCard');
    card.style.display='flex';
    document.getElementById('scoreDisplayLabel').textContent=sideName+' 本回合';
    const numEl=document.getElementById('scoreDisplayNum');
    numEl.textContent=gained;
    numEl.className='score-display-num '+(gained>=9?'high':gained>=5?'mid':'low');

    // Per-category bars
    const cats=p.cats||{};
    const catColors={'立場清楚':'#6ab0ff','課文依據':'#fdcb6e','理由說服力':'#ff8080','表達清楚':'#55efc4'};
    document.getElementById('scoreBars').innerHTML=Object.entries(cats).map(([k,v])=>
      `<div class="score-bar-row">
        <div class="score-bar-name">${k}</div>
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${(v/3)*100}%;background:${catColors[k]||'#ffeaa7'}"></div></div>
        <div class="score-bar-val">${v}</div>
      </div>`
    ).join('');

    document.getElementById('aiReason').innerHTML=
      `<strong>📊 這次的表現：</strong>${p.breakdown}<br><br>`+
      `<strong>💪 說得最好的地方：</strong>${p.strength}<br><br>`+
      `<strong>📖 下次可以這樣說：</strong>${p.weakness}<br><br>`+
      `<strong>⚖️ 天秤動了嗎？</strong>${p.scale_reason}`;
    document.getElementById('recStatus').textContent=`評分完成！${sideName} 本回合 ${gained} 分`;
    const pip=document.getElementById('pip'+currentRound);
    if(pip)pip.className='round-pip '+side;
    document.getElementById('nextBtn').disabled=false;
    document.getElementById('verdictBtn').disabled=false;
  }catch(err){
    document.getElementById('aiReason').textContent='評分失敗，請確認網路。（'+err.message+'）';
  }
}

function updateScaleUI(){
  const diff=scores.pro-scores.con;
  const angle=Math.max(-18,Math.min(18,diff*1.4));
  document.getElementById('scaleBeam').style.transform=`translateX(-50%) rotate(${-angle}deg)`;
  const half=(document.getElementById('scaleBeam').offsetWidth||200)/2;
  const rad=angle*Math.PI/180;
  document.getElementById('panL').style.bottom=(9+Math.sin(rad)*half*0.16)+'px';
  document.getElementById('panR').style.bottom=(9-Math.sin(rad)*half*0.16)+'px';

  // Tilt label
  const tiltEl=document.getElementById('scaleTiltLabel');
  const proLead=document.getElementById('proLeading');
  const conLead=document.getElementById('conLeading');
  if(diff===0){
    tiltEl.textContent='持平'; tiltEl.className='scale-tilt-label';
    proLead.textContent=''; conLead.textContent='';
  } else if(diff>0){
    const deg=Math.abs(angle).toFixed(1);
    tiltEl.textContent='◀ 正方領先'; tiltEl.className='scale-tilt-label leading-pro';
    proLead.textContent='▲ +'+(scores.pro-scores.con)+'分';
    conLead.textContent='';
  } else {
    tiltEl.textContent='反方領先 ▶'; tiltEl.className='scale-tilt-label leading-con';
    conLead.textContent='▲ +'+(scores.con-scores.pro)+'分';
    proLead.textContent='';
  }
}

function nextRound(){
  currentRound++;
  addRoundPip(currentRound, false);
  loadRound();
}

async function requestVerdict(){
  document.getElementById('loadingText').textContent='法官最終裁決中…';
  document.getElementById('loadingOverlay').classList.add('show');
  const summary=roundData.map((r,i)=>`第${i+1}回合（${r.side==='pro'?proName:conName}，${r.score}分）：「${r.transcript.slice(0,80)}」`).join('\n');
  const prompt=`你是神界法庭最高法官，現在要對一場國小五年級學生的國語課辯論做最終裁決。

【辯論題目】${TOPIC.q}
【正方（${proName}）總分】${scores.pro}
【反方（${conName}）總分】${scores.con}
【各回合完整紀錄】
${summary}
【課文完整重點】${COURSE_TEXT}

裁決規則（非常重要）：
- 學生是國小五年級，裁決語氣要莊嚴但溫暖，像一位慈祥又公正的法官
- winner_reason 必須具體引用課文內容，說明哪些課文細節支持了獲勝方
- overall_comment 要分別對正方和反方說一句鼓勵，並各給一個「如果下次再辯論，可以從課文的哪裡找更多支援」的具體提示
- course_reflection 是給全班的問題，引導學生思考課文更深的意義

請以 JSON 格式回應，不要有任何其他文字：
{"verdict":"無罪或有罪（無罪＝偷火是對的，有罪＝偷火是錯的）","verdict_explain":"一句話說明這個裁決的意思，給五年級學生聽得懂的說法","winner":"pro或con","winner_reason":"獲勝方為何更有說服力，必須具體提到課文中的哪個段落或細節（2-3句）","overall_comment":"對雙方的鼓勵與課文引導提示（各一句，約80-100字）","course_reflection":"給全班一個值得繼續思考的問題，和課文內容有關（一句話，引導深思）","court_speech":"法官莊嚴宣判的話（約30-40字，有氣勢但帶有溫度）"}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const raw=data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const v=JSON.parse(raw);
    document.getElementById('loadingOverlay').classList.remove('show');
    const wSide=v.winner;
    const wName=wSide==='pro'?proName:conName;
    const isInnocent=v.verdict==='無罪';
    document.getElementById('verdictTitle').textContent=v.verdict;
    document.getElementById('verdictTitle').className='verdict-title '+(isInnocent?'innocent':'guilty');
    document.getElementById('verdictSubtitle').textContent=v.verdict_explain||'';
    const w=document.getElementById('verdictWinner');
    w.textContent='🏆 '+wName+' 勝出'; w.className='verdict-winner '+wSide;
    document.getElementById('verdictReasoning').innerHTML=
      `<strong>⚖️ 裁決理由（課文依據）</strong><br>${v.winner_reason}<br><br>`+
      `<strong>🌟 給雙方的話</strong><br>${v.overall_comment}<br><br>`+
      `<strong>💭 繼續想一想</strong><br>${v.course_reflection}<br><br>`+
      `<em>「${v.court_speech}」</em>`;
    document.getElementById('vProName').textContent=proName;
    document.getElementById('vConName').textContent=conName;
    document.getElementById('vProScore').textContent=scores.pro;
    document.getElementById('vConScore').textContent=scores.con;
    showScreen('verdict');
  }catch(err){
    document.getElementById('loadingOverlay').classList.remove('show');
    alert('裁決失敗，請確認網路連線。');
  }
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function goSetup(){showScreen('setup')}
</script>
</body>
</html>
